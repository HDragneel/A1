<!DOCTYPE html>
<html>

<head>
<title>Imagen Random</title>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
flex-direction:column;
font-family:Arial;
}

#facebook{
position:fixed;
right:20px;
top:50%;
}
  
button{
font-size:40px;
padding:20px 40px;
cursor:pointer;
}

img{
margin-top:20px;
max-width:80%;
display:none;
}

</style>

</head>

<body>

<button id="boton">¿Ya se unifico?</button>

<img id="imagenRandom">

<a id="facebook" href="https://www.facebook.com/PaginaDe1NombreLargote" target="_blank">
<img src="facebook.png" width="80">
</a>

<script>

let boton = document.getElementById("boton");
let imagen = document.getElementById("imagenRandom");

boton.onclick = function(){

let numeroRandom = Math.floor(Math.random() * 3) + 1;

imagen.src = "imagenes/" + numeroRandom + ".jpg";

imagen.style.display = "block";

boton.style.display = "none";
  
};

</script>

</body>

</html>
