<!DOCTYPE html>
<html>

<head>
<title>Imagen Random</title>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
flex-direction:column;
font-family:Arial;
}

#imagenRandom{
max-width:70%;
max-height:70vh;
animation: aparecer 0.5s ease;
}

@keyframes aparecer{
from{
opacity:0;
transform:scale(0.8);
}
to{
opacity:1;
transform:scale(1);
}

 
body{
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}
  
  button{
font-size:50px;
padding:25px 60px;
background-color:#26CFFF;
color:white;
border:none;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background-color:#cc0000;
transform:scale(1.1);
}
  
#imagenRandom{
max-width:70%;
max-height:70vh;
height:auto;
}
  
#facebook{
position:fixed;
right:20px;
top:50%;
}
  
button{
font-size:40px;
padding:20px 40px;
cursor:pointer;
}

img{
margin-top:20px;
max-width:80%;
display:none;
}

</style>

</head>

<body>

<button id="boton">¿Ya se unifico?</button>

<img id="imagenRandom">

<a id="facebook" href="https://www.facebook.com/PaginaDe1NombreLargote" target="_blank">
<img src="facebook.png" width="80">
</a>

<script>

let boton = document.getElementById("boton");
let imagen = document.getElementById("imagenRandom");

boton.onclick = function(){

let numeroRandom = Math.floor(Math.random() * 10) + 1;

imagen.src = "imagenes/" + numeroRandom + ".jpg";

imagen.style.display = "block";

boton.style.display = "none";
  
};

</script>

</body>

</html>
